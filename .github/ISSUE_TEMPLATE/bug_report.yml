name: Bug report
description: Report a reproducible gameplay, rendering, audio, or interface defect.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Neonplex. For security vulnerabilities, stop here and use the private Security advisory link in the issue chooser.

  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues for this problem.
          required: true
        - label: I can reproduce this on the current live build or the latest `main` branch.
          required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Gameplay or simulation
        - Rendering or animation
        - Performance
        - Controls or input
        - Menus or HUD
        - Audio
        - Build or tooling
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the observed behavior and why it appears incorrect.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Open level ...
        2. Move to ...
        3. Press ...
        4. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Build or commit
      description: Enter the live build identifier, release, or commit SHA if known.

  - type: input
    id: environment
    attributes:
      label: Browser and operating system
      placeholder: Chrome 000 on Windows 11
    validations:
      required: true

  - type: input
    id: display
    attributes:
      label: Display refresh rate and FPS
      description: Especially useful for animation or performance issues.
      placeholder: 144 Hz monitor; FPS counter shows 142-144

  - type: textarea
    id: evidence
    attributes:
      label: Screenshots, recordings, or logs
      description: Drag files here. Remove secrets or personal information first.

  - type: textarea
    id: additional
    attributes:
      label: Additional context
